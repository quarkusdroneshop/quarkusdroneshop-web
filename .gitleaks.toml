[extend]
useDefault = true

[allowlist]
description = "プロジェクト固有の除外設定"
paths = [
  """target/.*""",
  """\.mvn/.*""",
  """node_modules/.*""",
]

[[rules]]
description = "Generic API Key"
id = "generic-api-key"
regex = """(?i)(api[_-]?key|apikey)\s*[:=]\s*['"]?([A-Za-z0-9_\-]{20,})['"]?"""
secretGroup = 2
severity = "HIGH"
tags = ["api", "generic"]

[[rules]]
description = "Generic Secret"
id = "generic-secret"
regex = """(?i)(secret|password|passwd|token)\s*[:=]\s*['"]([^'"]{8,})['"]"""
secretGroup = 2
severity = "HIGH"
tags = ["secret", "generic"]
[rules.allowlist]
regexes = [
  """(?i)(dummy|example|placeholder|changeme|xxx|test|\$\{)""",
  """\$\{""",
]

