apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: quarkusdroneshop-web
  description: Webサービス用のマイクロサービスです
  labels:
    app: web
  annotations:
    github.com/project-slug: quarkusdroneshop/quarkusdroneshop-web
    backstage.io/kubernetes-id: quarkusdroneshop-web
    backstage.io/kubernetes-cluster: b-cluster
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=quarkusdroneshop-web
    tektonci.io/pipeline: build-and-push-quarkusdroneshop-web
    tektonci.io/pipelineNamespace: quarkusdroneshop-cicd
    tekton.dev/cicd: "true"
    janus-idp.io/tekton: "true"
spec:
  type: web
  owner: user:default/nmushino
  lifecycle: production
  system: b-cluster
  dependsOn:
    - component:quarkusdroneshop-counter
    - resource:shop-cluster-kafka
    - resource:shop-web-updates
    - resource:shop-loyalty-updates
    - resource:shop-bsite-rewards
  consumesApis:
    - kafka-web-updates
    - kafka-loyalty-updates
    - kafka-shop-bsite-rewards
  providesApis:
    - quarkusdroneshop-web-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: quarkusdroneshop-web-api
  description: オーダ情報 REST API
spec:
  type: openapi
  lifecycle: production
  owner: user:default/nmushino
  system: b-cluster
  definition: |
    openapi: 3.0.0
    info:
      title: quarkusdroneshop-web API
      version: 5.2.0
    paths:
      /order:
        get:
          summary: オーダ情報を取得
          responses:
            '200':
              description: OK
